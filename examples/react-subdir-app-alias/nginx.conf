server {
    listen 80;
    server_name localhost;

    index index.html;

    # ============================================================
    # 保留前缀转发方式：使用 alias 映射
    # ============================================================
    #
    # 网关 proxy_pass 不带尾斜杠，保留了 /react-alias/ 前缀
    # 所以容器收到的请求路径是 /react-alias/、/react-alias/about 等
    #
    # alias 的作用：将 URL 中的 /react-alias/ 替换为 /usr/share/nginx/html/
    #   /react-alias/           → /usr/share/nginx/html/
    #   /react-alias/index.html → /usr/share/nginx/html/index.html
    #   /react-alias/about      → /usr/share/nginx/html/about（不存在 → try_files 回退）
    #
    # 对比 root 指令：root 会拼接路径
    #   /react-alias/index.html → /usr/share/nginx/html/react-alias/index.html ❌ 找不到
    # ============================================================

    location /react-alias/ {
        alias /usr/share/nginx/html/;

        # SPA history 模式：找不到文件时回退到 index.html
        # 注意：回退路径必须带 /react-alias/ 前缀，否则会匹配到其他 location
        try_files $uri $uri/ /react-alias/index.html;
    }

    # 静态资源长期缓存
    location ~* ^/react-alias/assets/(.+)$ {
        alias /usr/share/nginx/html/assets/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
