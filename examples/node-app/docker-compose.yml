services:
  node-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-app
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  gateway-network:
    external: true
