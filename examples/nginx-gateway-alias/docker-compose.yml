services:
  nginx-gateway-alias:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nginx-gateway-alias
    ports:
      - "80:80"
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  gateway-network:
    external: true
