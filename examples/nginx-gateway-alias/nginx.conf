worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost;

        # ============================================================
        # 保留前缀转发方式
        # ============================================================
        #
        # 与 nginx-gateway 的区别：
        #   nginx-gateway:   proxy_pass http://app:80/;  ← 有尾斜杠，去掉前缀
        #   nginx-gateway-alias: proxy_pass http://app:80 ← 无尾斜杠，保留前缀
        #
        # 保留前缀意味着前端容器收到的请求路径仍然带 /vue-alias/ 等前缀
        # 前端容器内的 Nginx 需要用 alias 指令来处理
        #
        # 这种方式的好处：
        #   前端容器可以独立运行（直接访问前端容器 80 端口），路由也能正常工作
        #   因为前端项目和容器 Nginx 都认知路径前缀
        # ============================================================

        # Vue SPA — 保留 /vue-alias/ 前缀转发
        # proxy_pass 末尾没有 /，请求路径原样传递到后端
        location /vue-alias/ {
            proxy_pass http://vue-subdir-app-alias:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # React SPA — 保留 /react-alias/ 前缀转发
        location /react-alias/ {
            proxy_pass http://react-subdir-app-alias:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
}
