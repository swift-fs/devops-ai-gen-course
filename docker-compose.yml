services:
  devops-course:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-course
    restart: unless-stopped
    networks:
      - gateway-network
    # 仅内部暴露，由外部 Nginx 网关反向代理访问
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  gateway-network:
    external: true
